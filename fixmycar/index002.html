<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FixMyCar – Lihtne prototüüp</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        color: #1e2937;
        line-height: 1.6;
    }
    header {
        background: white;
        padding: 1rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: center;
    }
    .container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    h1 { margin: 0; color: #1e40af; }
    
    .search-box {
        margin: 2rem 0;
        position: relative;
    }
    #carSearch {
        width: 100%;
        padding: 16px 50px 16px 20px;
        font-size: 1.1rem;
        border: 2px solid #cbd5e1;
        border-radius: 12px;
        outline: none;
        background: white;
    }
    #carSearch:focus {
        border-color: #1e40af;
        box-shadow: 0 0 0 4px rgba(30,64,175,0.15);
    }

    .clear-btn {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 1.6rem;
        color: #94a3b8;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
        display: none;
    }
    .clear-btn:hover {
        color: #475569;
    }
    .clear-btn.visible {
        display: block;
    }

    .car-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 2rem;
    }
    .car-btn {
        padding: 12px 18px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: all 0.2s;
    }
    .car-btn:hover, .car-btn.active {
        background: #1e40af;
        color: white;
        border-color: #1e40af;
    }

    #results {
        display: none;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
    }
    .results-header {
        background: #1e40af;
        color: white;
        padding: 1.5rem;
        font-size: 1.4rem;
        font-weight: 700;
    }
    .fault-list {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
    }
    .fault-card {
        background: #f8fafc;
        padding: 1.25rem;
        border-radius: 10px;
        border-left: 5px solid #64748b;
    }
    .fault-card.kallis { border-left-color: #e11d48; }
    .fault-card.kesk { border-left-color: #ca8a04; }
    .fault-card.odav { border-left-color: #10b981; }

    .cost {
        font-weight: bold;
        font-size: 0.9rem;
        padding: 4px 10px;
        border-radius: 9999px;
        display: inline-block;
        margin-top: 8px;
    }
    .odav { background: #ecfdf5; color: #10b981; }
    .kesk { background: #fefce8; color: #ca8a04; }
    .kallis { background: #fee2e2; color: #e11d48; }

    .copy-btn {
        margin-top: 10px;
        padding: 8px 14px;
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .copy-btn.copied {
        background: #10b981;
        color: white;
        border-color: #10b981;
    }

    .stores {
        padding: 1.5rem;
        background: #f1f5f9;
        text-align: center;
    }
    .stores a {
        margin: 0 8px;
        color: #1e40af;
        text-decoration: none;
        font-weight: 500;
    }
</style>
</head>
<body>

<header>
    <h1>FixMyCar – Lihtne prototüüp</h1>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="carSearch" placeholder="Otsi mudelit (nt BMW E46, Volvo V70...)">
        <button class="clear-btn" id="clearBtn">✕</button>
    </div>

    <div class="car-list" id="carList"></div>

    <div id="results">
        <div class="results-header" id="carTitle"></div>
        
        <div class="fault-list" id="faultList"></div>
        
        <div class="stores">
            <p><strong>Otsi varuosi:</strong></p>
            <a href="https://www.alvadi.ee/" target="_blank">Alvadi</a>
            <a href="https://www.aeromotors.eu/" target="_blank">Aeromotors</a>
            <a href="https://www.iparts.ee/" target="_blank">iParts</a>
            <a href="https://www.autodoc.ee/" target="_blank">Autodoc</a>
            <a href="https://www.fixus.ee/" target="_blank">Fixus</a>
        </div>
    </div>
</div>

<script>
const CARS = {
  "BMW 3-seeria E46 (1999–2006)": [{title:"Tagaosa aluspinna laagripesad murduvad läbi", desc:"Tagumine subframe kaevub rooste tõttu kerest välja — E46 kõige tuntum ohukoht.", cost:"kallis", search:"BMW E46 subframe laager"}, {title:"Jahutussüsteemi plastosad pragevad", desc:"Plastikust ekspansioonipaak ja torud lähevad katki.", cost:"kesk", search:"BMW E46 veepump termostat"}, {title:"Aknatihendusnurk lekib", desc:"Tagaklaasi tihend laseb niiskust sisse.", cost:"odav", search:"BMW E46 tagumine klaas tihend"}],
  
  "BMW 3-seeria E90/E91 (2005–2012)": [{title:"N47 diisel — ketikomplekt katki tagant", desc:"Kurikuulus N47 mootor, kett puruneb tihti. Täielik mootoririke.", cost:"kallis", search:"BMW E90 N47 timing chain"}, {title:"EGR-moodul ummistub", desc:"Mootor kaotab jõudu ja suitsetab.", cost:"odav", search:"BMW E90 EGR klapp"}],
  
  "BMW 5-seeria E39 (1996–2003)": [{title:"Veepump sureb ootamatult", desc:"Eriti plastosaga versioonidel.", cost:"kesk", search:"BMW E39 veepump"}, {title:"Tagumise vasaku nurga laager kulub", desc:"Koputus kurvis.", cost:"odav", search:"BMW E39 tagumine laager"}],
  
  "BMW 5-seeria E60/E61 (2003–2010)": [{title:"N47 diisel — ketikomplekt puruneb", desc:"Sama probleem kui E90-l.", cost:"kallis", search:"BMW E60 N47 timing chain"}, {title:"Elektroniline vedrustus (EDC) tõrked", desc:"Auto vajub.", cost:"kallis", search:"BMW E60 EDC vedrustus"}],
  
  "Volkswagen Golf 4 (1997–2004)": [{title:"1.9 TDI PD klapikaane tihend lekib", desc:"Kõrgema läbisõiduga autod.", cost:"odav", search:"VW Golf 4 PD klapikaane tihend"}, {title:"Elektriakna käitis keeldub", desc:"Hammasratas puruneb.", cost:"odav", search:"VW Golf 4 aknamasin"}],
  
  "Volkswagen Golf 5 (2004–2008)": [{title:"DSG6 mechatronic ebaõnnestub", desc:"Kõige sagedasem rike.", cost:"kallis", search:"VW Golf 5 DSG mechatronic"}, {title:"1.9 TDI PD klapikaane tihend", desc:"Õlileke.", cost:"odav", search:"VW Golf 5 PD tihend"}],
  
  "Volkswagen Golf 6 (2009–2013)": [{title:"DSG7 DQ200 tõmbleb ja vibreerib", desc:"Linnasõidus kiire kulumine.", cost:"kallis", search:"VW Golf 6 DSG7 sidur"}, {title:"1.2 TSI ketikomplekt kulub", desc:"Ennetav vahetus soovitatav.", cost:"kesk", search:"VW Golf 6 1.2 TSI ketikomplekt"}],
  
  "Volkswagen Passat B6 (2005–2010)": [{title:"DSG mechatronic — kõige levinum rike", desc:"Auto tõmbab ja ei vaheta käike.", cost:"kallis", search:"VW Passat B6 DSG mechatronic"}],
  
  "Volvo S40/V50 (2004–2012)": [{title:"1.6D kõrgsurvepump ebaõnnestub", desc:"Auto läheb limp-modei.", cost:"kallis", search:"Volvo V50 1.6D kütusepump"}, {title:"Esisilla tugivarras kulub", desc:"Koputab madalal kiirusel.", cost:"odav", search:"Volvo V50 lower arm"}],
  
  "Volvo S60/V70 Mk2 (2000–2009)": [{title:"AW55 automaatkast libiseb", desc:"Külmalt eriti.", cost:"kallis", search:"Volvo V70 AW55 automaatkast"}, {title:"ETM-moodul sureb", desc:"Mootor võib sõidu ajal seiskuda.", cost:"kesk", search:"Volvo V70 ETM"}],
  
  "Volvo XC90 Mk1 (2002–2014)": [{title:"AW55 automaatkast libiseb", desc:"Sama probleem kui V70-l.", cost:"kallis", search:"Volvo XC90 AW55"}, {title:"Transfer case mootor kulub", desc:"4WD ei lülitu sisse.", cost:"kallis", search:"Volvo XC90 transfer case"}]
};

const carSearch = document.getElementById('carSearch');
const clearBtn = document.getElementById('clearBtn');
const results = document.getElementById('results');
const carTitle = document.getElementById('carTitle');
const faultList = document.getElementById('faultList');
const carListEl = document.getElementById('carList');

// Autode nimekiri
Object.keys(CARS).forEach(model => {
    const btn = document.createElement('button');
    btn.className = 'car-btn';
    btn.textContent = model;
    btn.onclick = () => {
        document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showCar(model);
    };
    carListEl.appendChild(btn);
});

function showCar(name) {
    if (!CARS[name]) return;
    
    carTitle.textContent = name;
    faultList.innerHTML = '';
    
    CARS[name].forEach(fault => {
        const div = document.createElement('div');
        div.className = `fault-card ${fault.cost}`;
        div.innerHTML = `
            <strong>${fault.title}</strong>
            <p>${fault.desc}</p>
            <div class="cost ${fault.cost}">${fault.cost.toUpperCase()}</div>
            <button class="copy-btn" data-text="${fault.search}">📋 Kopeeri otsingufraas</button>
        `;
        faultList.appendChild(div);
    });
    
    results.style.display = 'block';
    results.scrollIntoView({ behavior: "smooth" });
}

// Kopeerimine
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('copy-btn')) {
        const btn = e.target;
        const text = btn.getAttribute('data-text');
        
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.textContent;
            btn.textContent = '✅ Kopeeritud!';
            btn.classList.add('copied');
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
        });
    }
});

// Otsing + X nupp
carSearch.addEventListener('input', () => {
    const term = carSearch.value.trim();
    if (term.length > 0) {
        clearBtn.classList.add('visible');
    } else {
        clearBtn.classList.remove('visible');
        resetToStart();
    }
    
    const found = Object.keys(CARS).find(key => 
        key.toLowerCase().includes(term.toLowerCase())
    );
    
    if (found) showCar(found);
});

clearBtn.addEventListener('click', () => {
    carSearch.value = '';
    clearBtn.classList.remove('visible');
    resetToStart();
    carSearch.focus();
});

function resetToStart() {
    results.style.display = 'none';
    document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
}
</script>

</body>
</html>

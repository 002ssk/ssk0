<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minu Veebileht</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 80px 20px;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 20px auto;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tere, maailm! 🌍</h1>
        <p>See on sinu uus veebileht</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Mis sa tahad siia panna?</h2>
            <p>Kirjuta mulle, mida sa tahad lehele lisada (nt oma nimi, pildid, projektid, CV, blogi, pood jne) ja ma teen sulle parema versiooni.</p>
        </div>

        <div class="card">
            <h2>Proovi nuppu</h2>
            <button onclick="alert('Tere! 😊 Veebileht töötab!')">Vajuta mind</button>
        </div>
    </div>

    <footer>
        <p>Valmistatud Grokiga • 2026</p>
    </footer>
</body>
</html>
